<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Gastos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #eeeee9;
      --bg-danger: #fcebeb;
      --text-primary: #1a1a19;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --text-danger: #a32d2d;
      --text-success: #0f6e56;
      --border-tertiary: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --bg-danger: #2e1a1a;
        --text-primary: #f0efea;
        --text-secondary: #a8a8a2;
        --text-tertiary: #6b6b65;
        --text-danger: #f09595;
        --text-success: #5dcaa5;
        --border-tertiary: rgba(255,255,255,0.10);
        --border-secondary: rgba(255,255,255,0.20);
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
    .header-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--text-secondary);
    }
    .header h1 { font-size: 20px; font-weight: 500; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-value.danger { color: var(--text-danger); }

    .section {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 11px; font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .form-row input[type="text"] { flex: 1; min-width: 180px; }
    .form-row input[type="number"] { width: 140px; }
    input {
      font-family: var(--font-sans);
      font-size: 14px;
      padding: 8px 12px;
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--text-secondary); }
    input::placeholder { color: var(--text-tertiary); }

    .add-btn {
      font-family: var(--font-sans);
      font-size: 14px; font-weight: 500;
      padding: 8px 18px;
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--bg-secondary); }
    .add-btn:active { transform: scale(0.98); }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { font-size: 13px; color: var(--text-danger); margin-top: 8px; display: none; }

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-wrap { position: relative; width: 100%; height: 220px; }

    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .badge {
      font-size: 11px; padding: 3px 10px;
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .expense-list { display: flex; flex-direction: column; gap: 6px; }
    .expense-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-tertiary);
      background: var(--bg-primary);
      transition: background 0.15s;
    }
    .expense-item:hover { background: var(--bg-secondary); }
    .expense-item-left { display: flex; align-items: center; gap: 10px; }
    .expense-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .expense-name { font-size: 14px; }
    .expense-right { display: flex; align-items: center; gap: 12px; }
    .expense-value { font-size: 14px; font-weight: 500; }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary);
      padding: 3px 5px; border-radius: 4px; font-size: 15px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .delete-btn:hover { color: var(--text-danger); background: var(--bg-danger); }

    .empty { text-align: center; padding: 2.5rem; color: var(--text-secondary); font-size: 14px; }
    .empty i { font-size: 28px; display: block; margin-bottom: 10px; }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 10px 16px; font-size: 13px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.error { color: var(--text-danger); border-color: var(--text-danger); }

    footer { text-align: center; margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-wallet" aria-hidden="true"></i></div>
    <div>
      <h1>Controle de Gastos</h1>
      <p>Gerencie suas despesas pessoais</p>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Total gasto</div>
      <div class="metric-value danger" id="total">R$ 0,00</div>
    </div>
    <div class="metric">
      <div class="metric-label">Nº de despesas</div>
      <div class="metric-value" id="count">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Média por item</div>
      <div class="metric-value" id="avg">R$ 0,00</div>
    </div>
    <div class="metric">
      <div class="metric-label">Maior gasto</div>
      <div class="metric-value" id="max">R$ 0,00</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Adicionar despesa</div>
    <div class="form-row">
      <input type="text" id="nome-input" placeholder="Nome da despesa" />
      <input type="number" id="valor-input" placeholder="Valor (R$)" min="0" step="0.01" />
      <button class="add-btn" id="add-btn" onclick="adicionarGasto()">
        <i class="ti ti-plus" aria-hidden="true"></i>Adicionar
      </button>
    </div>
    <div class="error-msg" id="erro"></div>
  </div>

  <div class="charts-grid">
    <div class="section">
      <div class="section-title">Distribuição por despesa</div>
      <div class="chart-wrap">
        <canvas id="pieChart" role="img" aria-label="Gráfico de distribuição dos gastos"></canvas>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Valor por despesa</div>
      <div class="chart-wrap">
        <canvas id="barChart" role="img" aria-label="Gráfico de barras com valor de cada gasto"></canvas>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="list-header">
      <div class="section-title" style="margin-bottom:0;">Lista de gastos</div>
      <span class="badge" id="list-count">0 itens</span>
    </div>
    <div class="expense-list" id="lista"></div>
    <div class="empty" id="vazio">
      <i class="ti ti-receipt-off" aria-hidden="true"></i>
      Nenhuma despesa cadastrada
    </div>
  </div>

  <footer>Controle de Gastos — Pedro Antônio Falcão de Assis</footer>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const COLORS = ['#3266ad','#1D9E75','#D85A30','#D4537E','#BA7517','#7F77DD','#639922','#0F6E56','#993C1D','#534AB7'];
  let gastos = [];
  let pieChart, barChart;

  function fmt(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function carregarGastos() {
    try {
      const res = await fetch('/api/gastos');
      gastos = await res.json();
      atualizar();
    } catch {
      showToast('Erro ao carregar gastos.', true);
    }
  }

  async function adicionarGasto() {
    const nome = document.getElementById('nome-input').value.trim();
    const valorRaw = document.getElementById('valor-input').value;
    const valor = parseFloat(valorRaw);
    const erro = document.getElementById('erro');

    if (!nome || isNaN(valor) || valor < 0) {
      erro.textContent = 'Preencha todos os campos com valores válidos.';
      erro.style.display = 'block';
      return;
    }
    erro.style.display = 'none';

    const btn = document.getElementById('add-btn');
    btn.disabled = true;

    try {
      const res = await fetch('/api/gastos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, valor })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || 'Erro ao adicionar');
      }

      document.getElementById('nome-input').value = '';
      document.getElementById('valor-input').value = '';
      showToast('Gasto adicionado!');
      await carregarGastos();
    } catch (e) {
      showToast(e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  async function removerGasto(i) {
    try {
      const res = await fetch(`/api/gastos/${i}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Erro ao remover');
      showToast('Gasto removido.');
      await carregarGastos();
    } catch {
      showToast('Erro ao remover gasto.', true);
    }
  }

  function atualizarMetricas() {
    const total = gastos.reduce((a, g) => a + g.valor, 0);
    const max = gastos.length ? Math.max(...gastos.map(g => g.valor)) : 0;
    document.getElementById('total').textContent = fmt(total);
    document.getElementById('count').textContent = gastos.length;
    document.getElementById('avg').textContent = fmt(gastos.length ? total / gastos.length : 0);
    document.getElementById('max').textContent = fmt(max);
  }

  function atualizarLista() {
    const lista = document.getElementById('lista');
    const vazio = document.getElementById('vazio');
    document.getElementById('list-count').textContent = gastos.length + ' itens';
    if (!gastos.length) {
      lista.innerHTML = '';
      vazio.style.display = 'block';
      return;
    }
    vazio.style.display = 'none';
    lista.innerHTML = gastos.map((g, i) => `
      <div class="expense-item">
        <div class="expense-item-left">
          <div class="expense-dot" style="background:${COLORS[i % COLORS.length]}"></div>
          <span class="expense-name">${g.nome}</span>
        </div>
        <div class="expense-right">
          <span class="expense-value">${fmt(g.valor)}</span>
          <button class="delete-btn" onclick="removerGasto(${i})" aria-label="Remover ${g.nome}">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>
      </div>`).join('');
  }

  function atualizarGraficos() {
    if (!gastos.length) {
      if (pieChart) { pieChart.destroy(); pieChart = null; }
      if (barChart) { barChart.destroy(); barChart = null; }
      return;
    }
    const labels = gastos.map(g => g.nome);
    const vals = gastos.map(g => g.valor);
    const colors = gastos.map((_, i) => COLORS[i % COLORS.length]);

    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '60%' }
    });

    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 11 }, color: '#888', autoSkip: true, maxRotation: 40 }, grid: { display: false } },
          y: { ticks: { font: { size: 11 }, color: '#888', callback: v => 'R$' + v }, grid: { color: 'rgba(128,128,128,0.1)' } }
        }
      }
    });
  }

  function atualizar() {
    atualizarMetricas();
    atualizarLista();
    atualizarGraficos();
  }

  document.getElementById('nome-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('valor-input').focus();
  });
  document.getElementById('valor-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') adicionarGasto();
  });

  carregarGastos();
</script>
</body>
</html>
