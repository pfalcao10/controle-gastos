name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar lint
        run: |
          pip install flake8
          flake8 . --ignore=E203,W503,E302,E305,W293,W292,E402 --max-line-length=120

      - name: Rodar testes
        run: |
          pytest -v
